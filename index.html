/photo-1559628233-eb1b1a45564b?auto=format&fit=crop&w=400&q=80", "info": "🍱 阿勇河谷日落晚餐 | 需预约", "link": "https://www.tripadvisor.cn/Restaurant_Review-g297701-d7253503-Reviews-The_Sayan_House-Ubud_Gianyar_Regency_Bali.html"}], "tips": "📸 摄影：Sayan House 的靠窗位置非常火爆，建议提前 2 天预约。"}, {"day": 7, "date": "2月17日", "title": "启程回家：巴厘岛-香港", "hotel": "Regala Skycity Hotel (HK)", "desc": "\n                <b>✈️ 飞行计划：</b><br>\n                • <b>第一程：</b>巴厘岛 (DPS) 16:20 ➔ 香港 (HKG) 21:10 (CX784)<br>\n                • <b>第二程：</b>次日 10:15 香港 (HKG) ➔ 北京 (PEK) 13:50 (CX348)<br>\n                <br>\n                <b>🏨 中转安排：</b><br>\n                落地香港后，直接通过连廊入住丽豪航天城酒店。晚上可就近休息。\n            ", "pois": [{"name": "Sun Sun Warung", "lat": -8.508, "lon": 115.263, "type": "dining", "img": "https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=400&q=80", "info": "🍛 离别午餐 | 平价地道印尼菜", "link": "https://www.tripadvisor.cn/Restaurant_Review-g297701-d12903332-Reviews-Sun_Sun_Warung-Ubud_Gianyar_Regency_Bali.html"}, {"name": "Regala Skycity HK", "lat": 22.2985, "lon": 113.936, "type": "hotel", "img": "https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=400&q=80", "info": "✈️ 航天城酒店 | 直连机场", "link": "https://www.tripadvisor.cn/Hotel_Review-g294217-d23821034-Reviews-Regala_Skycity_Hotel-Hong_Kong.html"}], "tips": "🛍️ 提醒：回程行李请在巴厘岛值机时确认是否直挂北京。"}];
        let currentDay = 1;
        let map, markersGroup, polyline;

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([-8.7941, 115.2302], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            markersGroup = L.layerGroup().addTo(map);
        }

        function updateDay(day) {
            currentDay = day;
            const data = itineraryData.find(d => d.day === day);
            
            // Update Tabs
            document.getElementById('dayTabs').innerHTML = itineraryData.map(d => `
                <div class="tab ${d.day === day ? 'active' : ''}" onclick="updateDay(${d.day})">
                    Day ${d.day}<br><span style="font-size: 10px; font-weight: normal;">${d.date}</span>
                </div>
            `).join('');

            // Update Content
            const poisHtml = data.pois.map(poi => `
                <a href="${poi.link}" class="poi-item" target="_blank">
                    <div class="poi-img" style="background-image: url('${poi.img}')"></div>
                    <div class="poi-details">
                        <strong>${poi.name}</strong>
                        <span class="poi-info-text">${poi.info}</span>
                    </div>
                </a>
            `).join('');

            document.getElementById('dayContent').innerHTML = `
                <div class="itinerary-card">
                    <div class="hotel-badge"><i class="fas fa-bed"></i> 入住: ${data.hotel}</div>
                    <h2>${data.title}</h2>
                    <p style="margin-bottom: 15px;">${data.desc}</p>
                    ${data.tips ? `<div class="tips-card"><p>${data.tips}</p></div>` : ''}
                    <h3 style="font-size: 15px; margin-top: 20px; margin-bottom: 12px; color: var(--text-sub); border-left: 4px solid var(--primary); padding-left: 8px;">📍 详细行程情报:</h3>
                    ${poisHtml}
                </div>
            `;

            // Update Map
            markersGroup.clearLayers();
            if (polyline) polyline.remove();
            const latlngs = data.pois.filter(p => p.lat && p.lon).map(p => [p.lat, p.lon]);
            data.pois.filter(p => p.lat && p.lon).forEach(p => L.marker([p.lat, p.lon]).addTo(markersGroup).bindPopup(p.name));
            if (latlngs.length > 1) {
                polyline = L.polyline(latlngs, {color: 'var(--primary)', weight: 3, dashArray: '5, 10'}).addTo(map);
                map.fitBounds(polyline.getBounds(), {padding: [40, 40]});
            } else if (latlngs.length === 1) map.setView(latlngs[0], 14);
        }

        window.onload = () => { initMap(); updateDay(1); };
    </script>
